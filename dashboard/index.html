<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>covibe — 团队 Vibe Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0a0f; --card-bg:#12121a; --card-border:#1e1e2e;
  --text:#e0e0e0; --text-dim:#888; --accent:#7c5bf5;
  --accent-glow:rgba(124,91,245,0.3); --green:#4ade80;
  --yellow:#facc15; --red:#f87171; --blue:#60a5fa; --orange:#fb923c;
}
body { font-family:'SF Mono','JetBrains Mono','Fira Code',monospace; background:var(--bg); color:var(--text); min-height:100vh; }
body.light { --bg:#f5f5f7; --card-bg:#fff; --card-border:#e0e0e8; --text:#1a1a2e; --text-dim:#888; --accent:#6c4bf5; --accent-glow:rgba(108,75,245,0.2); }
body.light .sidebar { background:#fff; }
body.light .feed-item,.kanban-card,.exp-card { background:rgba(0,0,0,0.02); }

/* Layout */
.app { min-height:100vh; }

/* Top bar */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-bottom:1px solid var(--card-border); background:var(--card-bg); position:sticky; top:0; z-index:100; }
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-logo { font-size:18px; font-weight:700; background:linear-gradient(135deg,#7c5bf5,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.topbar-stat { font-size:11px; color:var(--text-dim); }
.topbar-stat b { color:var(--text); }
.topbar-right { display:flex; align-items:center; gap:10px; }
.conn-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.conn-dot.on { background:var(--green); animation:pulse 2s infinite; }
.conn-dot.off { background:var(--red); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.conn-label { font-size:10px; color:var(--text-dim); }
.theme-btn { width:28px; height:28px; border-radius:6px; border:1px solid var(--card-border); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; transition:all .2s; background:transparent; }
.theme-btn:hover { background:rgba(255,255,255,0.08); border-color:var(--accent); }

/* Main content */
.main { padding:14px 20px; display:grid; grid-template-rows:auto 1fr; gap:12px; height:calc(100vh - 52px); overflow:hidden; }

/* Top: Team bar - HORIZONTAL */
.team-bar { display:flex; gap:8px; align-items:center; overflow-x:auto; padding-bottom:2px; }
.team-bar .title { font-size:12px; font-weight:600; color:var(--text-dim); margin-right:4px; white-space:nowrap; flex-shrink:0; }
.member-chip { background:var(--card-bg); border:1px solid var(--card-border); border-radius:10px; padding:5px 10px 5px 6px; display:flex; align-items:center; gap:6px; transition:all .2s; cursor:pointer; flex-shrink:0; white-space:nowrap; }
.member-chip:hover { border-color:var(--accent); transform:translateY(-1px); }
.member-chip.vibing { border-color:var(--green); }
.member-chip.blocked { border-color:var(--red); }
.member-chip img { width:28px; height:28px; image-rendering:pixelated; }
.member-chip .name { font-size:11px; font-weight:600; }
.member-chip .sub { font-size:9px; color:var(--text-dim); }
.member-chip .file-tag { font-size:8px; color:var(--accent); background:rgba(124,91,245,0.1); padding:1px 5px; border-radius:3px; max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; }

/* Bottom: panels grid */
.panels { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; overflow:hidden; }
.panel { background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; display:flex; flex-direction:column; overflow:hidden; }
.panel-head { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-bottom:1px solid var(--card-border); flex-shrink:0; }
.panel-title { font-size:12px; font-weight:600; display:flex; align-items:center; gap:6px; }
.panel-count { font-size:10px; color:var(--text-dim); background:rgba(255,255,255,0.05); padding:1px 8px; border-radius:10px; }
.panel-body { padding:8px; overflow-y:auto; flex:1; }

/* Feed items */
.feed-item { font-size:10px; padding:5px 8px; border-radius:6px; background:rgba(255,255,255,0.02); border-left:3px solid var(--card-border); margin-bottom:4px; }
.feed-item.editing { border-left-color:var(--yellow); }
.feed-item.decision { border-left-color:var(--accent); }
.feed-item.experience { border-left-color:var(--green); }
.feed-item.conflict { border-left-color:var(--red); }
.feed-item.board { border-left-color:var(--blue); }
.feed-item.join { border-left-color:var(--orange); }
.feed-time { color:var(--text-dim); font-size:8px; margin-right:4px; }

/* Kanban cards */
.kanban-section { margin-bottom:8px; }
.kanban-label { font-size:9px; color:var(--text-dim); font-weight:600; margin-bottom:4px; text-transform:uppercase; }
.kanban-card { background:rgba(255,255,255,0.03); border-radius:6px; padding:6px 8px; margin-bottom:4px; font-size:10px; border-left:3px solid var(--card-border); }
.kanban-card.vibing { border-left-color:var(--green); }
.kanban-card.done { border-left-color:var(--accent); opacity:.7; }
.kanban-card.blocked { border-left-color:var(--red); }
.kanban-card .assignee { font-size:8px; color:var(--accent); }

/* Experience cards */
.exp-item { background:rgba(255,255,255,0.02); border-radius:6px; padding:6px 8px; margin-bottom:4px; font-size:10px; border-left:3px solid var(--green); }
.exp-meta { font-size:8px; color:var(--text-dim); display:flex; justify-content:space-between; margin-top:3px; }
.exp-upvote { cursor:pointer; }
.exp-upvote:hover { transform:scale(1.2); }

/* Stats row */
.stats-row { display:flex; gap:8px; padding:8px; }
.stat-mini { flex:1; text-align:center; }
.stat-mini .num { font-size:20px; font-weight:700; }
.stat-mini .label { font-size:8px; color:var(--text-dim); }
.stat-mini .num.green { color:var(--green); }
.stat-mini .num.yellow { color:var(--yellow); }
.stat-mini .num.accent { color:var(--accent); }
.stat-mini .num.red { color:var(--red); }

/* Heat items */
.heat-item { font-size:9px; padding:4px 8px; display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.03); }

/* Empty state */
.empty { font-size:10px; color:var(--text-dim); text-align:center; padding:20px; }

/* Member modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px; padding:24px; max-width:400px; width:90%; text-align:center; position:relative; }
.modal-close { position:absolute; top:12px; right:16px; cursor:pointer; font-size:18px; color:var(--text-dim); }
.modal img { width:100px; height:100px; image-rendering:pixelated; margin-bottom:12px; }
.modal .name { font-size:18px; font-weight:700; margin-bottom:4px; }
.modal .role { font-size:12px; color:var(--accent); margin-bottom:12px; }
.modal-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
.modal-stat { background:rgba(255,255,255,0.03); border-radius:8px; padding:8px; }
.modal-stat .val { font-size:20px; font-weight:700; color:var(--accent); }
.modal-stat .lbl { font-size:9px; color:var(--text-dim); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--card-border); border-radius:3px; }
</style>
</head>
<body>
<div class="app">

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">🎵 covibe</span>
    <span class="topbar-stat" id="teamTitle">等待成员上线...</span>
  </div>
  <div class="topbar-right">
    <span id="connDot" class="conn-dot off"></span>
    <span class="conn-label" id="connLabel">连接中</span>
    <button class="theme-btn" onclick="toggleTheme()" title="切换主题">🌗</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Team bar - horizontal -->
  <div class="team-bar" id="teamChips"></div>

  <!-- Panels grid -->
  <div class="panels">
    <!-- Activity -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">⚡ 实时动态</div>
        <div class="panel-count" id="feedCount">0</div>
      </div>
      <div class="panel-body" id="feedBody"><div class="empty">等待活动...</div></div>
    </div>

    <!-- Board -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">📋 任务看板</div>
        <div class="panel-count" id="boardCount">0</div>
      </div>
      <div class="panel-body" id="boardBody"><div class="empty">covibe board add "任务"</div></div>
    </div>

    <!-- Right column: Experience + Stats -->
    <div style="display:flex;flex-direction:column;gap:12px;overflow:hidden;">
      <!-- Experience -->
      <div class="panel" style="flex:1;">
        <div class="panel-head">
          <div class="panel-title">💡 经验板</div>
          <div class="panel-count" id="expCount">0</div>
        </div>
        <div class="panel-body" id="expBody"><div class="empty">covibe experience add "经验"</div></div>
      </div>

      <!-- Stats -->
      <div class="panel" style="flex-shrink:0;">
        <div class="panel-head"><div class="panel-title">📊 统计</div></div>
        <div class="stats-row">
          <div class="stat-mini"><div class="num green" id="sOnline">0</div><div class="label">在线</div></div>
          <div class="stat-mini"><div class="num yellow" id="sEditing">0</div><div class="label">编辑</div></div>
          <div class="stat-mini"><div class="num accent" id="sMessages">0</div><div class="label">消息</div></div>
          <div class="stat-mini"><div class="num red" id="sConflicts">0</div><div class="label">冲突</div></div>
        </div>
        <div class="panel-body" id="heatBody" style="max-height:120px;"></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Member Modal -->
<div class="modal-overlay" id="memberModal">
  <div class="modal">
    <span class="modal-close" onclick="closeModal()">✕</span>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const wsHost = params.get('server') || 'localhost:3456';
const token = params.get('token') || '';

const members = new Map();
const feed = [];
const fileEdits = {};
const memberEdits = {};
let conflictCount = 0;
let ws;

const STATE_MAP = {
  editing:{gif:'clawd-typing.gif',label:'正在编辑',cls:'vibing'},
  vibing:{gif:'clawd-typing.gif',label:'vibing',cls:'vibing'},
  thinking:{gif:'clawd-thinking.gif',label:'思考中',cls:'vibing'},
  building:{gif:'clawd-building.gif',label:'构建中',cls:'vibing'},
  blocked:{gif:'clawd-error.gif',label:'阻塞',cls:'blocked'},
  done:{gif:'clawd-happy.gif',label:'完成',cls:'vibing'},
  idle:{gif:'clawd-idle.gif',label:'空闲',cls:''},
  sleep:{gif:'clawd-sleeping.gif',label:'离线',cls:''},
};

function updateMember(name,status,file){
  if(!name||name==='🖥️ Dashboard') return;
  const m=members.get(name)||{name,status:'idle',file:null,edits:0};
  m.status=status;
  if(file!==undefined) m.file=file;
  if(status==='editing'){m.edits++;memberEdits[name]=(memberEdits[name]||0)+1;if(file)fileEdits[file]=(fileEdits[file]||0)+1;}
  m.lastSeen=Date.now();
  members.set(name,m);
}
function shortPath(p){if(!p)return'';const a=p.split('/');return a.length>2?'...'+a.slice(-2).join('/'):p;}

function addFeed(type,text,ts){
  feed.unshift({type,text,ts:ts||new Date().toISOString()});
  if(feed.length>200)feed.pop();
}

// ── Render ──
function render(){
  // Team chips
  const chips=document.getElementById('teamChips');
  const title=document.getElementById('teamTitle');
  if(members.size===0){title.textContent='等待成员上线...';chips.innerHTML='';return;}
  const onlineCount=[...members.values()].filter(m=>m.status!=='sleep').length;
  const editCount=[...members.values()].filter(m=>m.status==='editing').length;
  title.textContent=`👥 ${onlineCount} 在线 · 📝 ${editCount} 编辑中`;
  // 横排渲染成员
  let html='';
  for(const[name,m]of members){
    const s=STATE_MAP[m.status]||STATE_MAP.idle;
    html+=`<div class="member-chip ${s.cls}" onclick="showMember('${name}')"><img src="assets/${s.gif}"><div><div class="name">${name}</div><div class="sub">${s.label}</div>${m.file?`<div class="file-tag">${shortPath(m.file)}</div>`:''}</div></div>`;
  }
  chips.innerHTML=html;

  // Feed
  document.getElementById('feedCount').textContent=feed.length;
  document.getElementById('feedBody').innerHTML=feed.slice(0,30).map(f=>{
    const t=f.ts?new Date(f.ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}):''
    return`<div class="feed-item ${f.type}"><span class="feed-time">${t}</span>${f.text}</div>`;
  }).join('')||'<div class="empty">等待活动...</div>';

  // Experience
  const exps=feed.filter(f=>f.type==='experience');
  document.getElementById('expCount').textContent=exps.length;
  document.getElementById('expBody').innerHTML=exps.length>0?exps.slice(0,10).map(f=>
    `<div class="exp-item">${f.text}<div class="exp-meta"><span>${new Date(f.ts).toLocaleDateString('zh-CN')}</span><span class="exp-upvote">👍</span></div></div>`
  ).join(''):'<div class="empty">covibe experience add "经验"</div>';

  // Stats
  document.getElementById('sOnline').textContent=onlineCount;
  document.getElementById('sEditing').textContent=editCount;
  document.getElementById('sMessages').textContent=feed.length;
  document.getElementById('sConflicts').textContent=conflictCount;

  // Heatmap
  const sorted=Object.entries(fileEdits).sort((a,b)=>b[1]-a[1]).slice(0,6);
  document.getElementById('heatBody').innerHTML=sorted.length>0?sorted.map(([f,c])=>{
    const color=c>3?'var(--red)':c>1?'var(--yellow)':'var(--green)';
    return`<div class="heat-item"><span>${shortPath(f)}</span><span style="color:${color}">${c}次</span></div>`;
  }).join(''):'<div class="empty">暂无编辑记录</div>';
}

// ── Member modal ──
function showMember(name){
  const m=members.get(name);if(!m)return;
  const s=STATE_MAP[m.status]||STATE_MAP.idle;
  const recent=feed.filter(f=>f.text.includes(name)).slice(0,5);
  document.getElementById('modalContent').innerHTML=`
    <img src="assets/${s.gif}">
    <div class="name">${name}</div>
    <div class="role">${s.label}${m.file?' · '+shortPath(m.file):''}</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="val">${m.edits||0}</div><div class="lbl">编辑次数</div></div>
      <div class="modal-stat"><div class="val">${recent.length}</div><div class="lbl">最近活动</div></div>
    </div>
    ${recent.length>0?'<div style="text-align:left;margin-top:12px;font-size:10px;">'+recent.map(f=>`<div class="feed-item ${f.type}" style="margin-top:4px"><span class="feed-time">${new Date(f.ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</span>${f.text}</div>`).join('')+'</div>':''}`;
  document.getElementById('memberModal').classList.add('show');
}
function closeModal(){document.getElementById('memberModal').classList.remove('show');}
document.getElementById('memberModal').onclick=e=>{if(e.target.classList.contains('modal-overlay'))closeModal();};

// ── Message handling ──
function handleMessage(msg){
  const ts=msg.ts||new Date().toISOString();
  switch(msg.type){
    case'catchup':(msg.messages||[]).forEach(m=>handleMessage(m));break;
    case'active_edits':for(const[f,i]of Object.entries(msg.edits||{}))updateMember(i.editor,'editing',f);break;
    case'joined':case'join':if(msg.name!=='🖥️ Dashboard'){updateMember(msg.name,'idle');addFeed('join',`🟢 ${msg.name} 上线了`,ts);}break;
    case'left':updateMember(msg.name,'sleep');addFeed('join',`🔴 ${msg.name} 下线了`,ts);break;
    case'editing':updateMember(msg.name,'editing',msg.file);addFeed('editing',`✏️ ${msg.name} → ${shortPath(msg.file)}`,ts);break;
    case'done_editing':updateMember(msg.name,'idle');break;
    case'decision':addFeed('decision',`📋 ${msg.name}: ${msg.what}`,ts);break;
    case'experience':addFeed('experience',`💡 ${msg.name}: ${msg.content}`,ts);break;
    case'conflict':conflictCount++;addFeed('conflict',`⚠️ ${msg.other_editor} 和 ${msg.name||'?'} 冲突 ${shortPath(msg.file)}`,ts);break;
    case'board':addFeed('board',`📌 ${msg.name} ${msg.action}: ${msg.task?.content||''}`,ts);break;
    case'team_broadcast':addFeed('decision',`📢 ${msg.name}: ${msg.content}`,ts);break;
  }
  render();
}

// ── Theme ──
function toggleTheme(){
  document.body.classList.toggle('light');
  localStorage.setItem('covibe-theme',document.body.classList.contains('light')?'light':'dark');
}
if(localStorage.getItem('covibe-theme')==='light')document.body.classList.add('light');

// ── WebSocket ──
function connect(){
  try{
    ws=new WebSocket(`ws://${wsHost}${token?'?token='+token:''}`);
    ws.onopen=()=>{document.getElementById('connDot').className='conn-dot on';document.getElementById('connLabel').textContent='已连接';ws.send(JSON.stringify({type:'join',name:'🖥️ Dashboard'}));};
    ws.onclose=()=>{document.getElementById('connDot').className='conn-dot off';document.getElementById('connLabel').textContent='已断开';setTimeout(connect,3000);};
    ws.onmessage=e=>{try{handleMessage(JSON.parse(e.data));}catch{}};
  }catch{setTimeout(connect,3000);}
}

// ── REST polling ──
async function pollStatus(){
  try{
    const r=await fetch(`http://${wsHost}/status${token?'?token='+token:''}`);
    const d=await r.json();
    for(const[f,i]of Object.entries(d.active_edits||{}))updateMember(i.editor,'editing',f);
    for(const n of(d.members||[]))if(!members.has(n))updateMember(n,'idle');
    render();
  }catch{}
  try{
    const r=await fetch(`http://${wsHost}/since?ts=${new Date(Date.now()-60000).toISOString()}${token?'&token='+token:''}`);
    const d=await r.json();
    for(const msg of(d.messages||[]))if(!feed.find(f=>f.ts===msg.ts))handleMessage(msg);
  }catch{}
}

connect();
setTimeout(pollStatus,500);
setTimeout(pollStatus,2000);
setInterval(pollStatus,5000);
</script>
</body>
</html>
