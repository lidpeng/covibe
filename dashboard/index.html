<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>covibe — 团队 Vibe Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#06060b;--bg2:#0c0c14;--card-bg:rgba(16,16,28,0.8);--card-border:rgba(255,255,255,0.06);
  --text:#e8e8f0;--text-dim:#6b6b80;--text-muted:#44445a;
  --accent:#8b5cf6;--accent-glow:rgba(139,92,246,0.15);
  --green:#34d399;--green-glow:rgba(52,211,153,0.15);
  --yellow:#fbbf24;--yellow-glow:rgba(251,191,36,0.15);
  --red:#f87171;--red-glow:rgba(248,113,113,0.15);
  --blue:#60a5fa;--blue-glow:rgba(96,165,250,0.15);
  --orange:#fb923c;--orange-glow:rgba(251,146,60,0.15);
  --glass:rgba(255,255,255,0.03);--glass-border:rgba(255,255,255,0.08);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(139,92,246,0.08) 0%,transparent 50%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(96,165,250,0.05) 0%,transparent 50%);}
body.light{--bg:#f0f0f5;--bg2:#f8f8fc;--card-bg:rgba(255,255,255,0.85);--card-border:rgba(0,0,0,0.06);--text:#1a1a2e;--text-dim:#8888a0;--text-muted:#b0b0c0;--glass:rgba(255,255,255,0.6);--glass-border:rgba(0,0,0,0.08);}

/* ══ TOPBAR ══ */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--card-border);background:var(--card-bg);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.topbar-logo{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#8b5cf6,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-stat{font-size:12px;color:var(--text-dim);font-weight:500;}
.topbar-stat b{color:var(--text);font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.me-badge{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 8px;border-radius:20px;background:var(--accent-glow);border:1px solid rgba(139,92,246,.3);cursor:pointer;transition:all .2s;font-size:11px;font-weight:600;color:var(--accent);}
.me-badge:hover{border-color:var(--accent);background:rgba(139,92,246,.2);}
.me-badge .me-avatar{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
.me-edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;}
.me-edit-overlay.show{display:flex;}
.me-edit-box{background:var(--bg2);border:1px solid var(--card-border);border-radius:16px;padding:24px;width:320px;text-align:center;box-shadow:0 24px 48px rgba(0,0,0,.4);}
.me-edit-box h3{font-size:14px;margin-bottom:4px;}
.me-edit-box .me-hint{font-size:10px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;}
.me-edit-box .me-hint code{background:var(--glass);padding:1px 5px;border-radius:3px;font-size:9px;}
.me-edit-box input{width:100%;padding:10px 14px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-size:14px;font-family:inherit;outline:none;text-align:center;}
.me-edit-box input:focus{border-color:var(--accent);}
.me-member-list{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;justify-content:center;}
.me-member-opt{padding:5px 12px;border-radius:8px;background:var(--glass);border:1px solid var(--glass-border);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;color:var(--text);}
.me-member-opt:hover{border-color:var(--accent);background:var(--accent-glow);color:var(--accent);}
.me-edit-box .me-edit-actions{display:flex;gap:8px;margin-top:12px;justify-content:center;}
.chip-me{display:inline-block;font-size:7px;background:var(--accent);color:#fff;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.3px;margin-left:4px;vertical-align:middle;}
.tb{width:32px;height:32px;border-radius:10px;border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .2s;background:var(--glass);color:var(--text-dim);position:relative;font-family:inherit;}
.tb:hover{background:var(--accent-glow);border-color:var(--accent);color:var(--text);transform:scale(1.05);}
.conn-badge{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 7px;border-radius:20px;background:var(--glass);border:1px solid var(--glass-border);font-size:10px;font-weight:500;color:var(--text-dim);}
.conn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.conn-dot.on{background:var(--green);box-shadow:0 0 8px var(--green-glow);animation:glow 2s infinite;}
.conn-dot.off{background:var(--red);box-shadow:0 0 8px var(--red-glow);animation:glow 2s infinite;}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.5}}
.pomo-timer{font-size:10px;font-weight:700;color:var(--green);margin-left:2px;font-variant-numeric:tabular-nums;}
.pomo-timer.break{color:var(--blue);}
.badge-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--red);font-size:0;border:2px solid var(--bg2);display:none;}
.badge-dot.show{display:block;}

/* ══ MAIN ══ */
.main{padding:12px 20px;display:grid;grid-template-rows:auto 1fr;gap:10px;height:calc(100vh - 53px);overflow:hidden;}

/* ══ TEAM BAR ══ */
.team-bar{display:flex;gap:8px;align-items:center;overflow-x:auto;padding-bottom:2px;}
.team-bar::-webkit-scrollbar{height:2px;}
.member-chip{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:6px 12px 6px 6px;display:flex;align-items:center;gap:8px;transition:all .2s;cursor:pointer;flex-shrink:0;white-space:nowrap;position:relative;overflow:hidden;width:200px;}
.member-chip::before{content:'';position:absolute;inset:0;border-radius:12px;opacity:0;transition:opacity .2s;pointer-events:none;}
.member-chip:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2);}
.member-chip.vibing{border-color:rgba(52,211,153,.4);}
.member-chip.vibing::before{opacity:1;background:linear-gradient(135deg,var(--green-glow),transparent);}
.member-chip.blocked{border-color:rgba(248,113,113,.4);}
.member-chip.blocked::before{opacity:1;background:linear-gradient(135deg,var(--red-glow),transparent);}
.member-chip.focusing{border-color:rgba(96,165,250,.4);}
.member-chip.focusing::before{opacity:1;background:linear-gradient(135deg,var(--blue-glow),transparent);}
.member-chip img{width:90px;height:75px;image-rendering:pixelated;position:relative;z-index:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));margin:-12px -8px -12px 0;object-fit:cover;object-position:center 100%;}
.chip-info{position:relative;z-index:1;}
.chip-name{font-size:12px;font-weight:600;}
.chip-sub{font-size:9px;color:var(--text-dim);font-weight:500;display:flex;align-items:center;gap:4px;}
.chip-file{font-size:8px;color:var(--accent);background:var(--accent-glow);padding:1px 6px;border-radius:4px;max-width:130px;overflow:hidden;white-space:nowrap;display:flex;align-items:center;gap:3px;margin-top:2px;}
.chip-file-text{display:inline-block;max-width:100px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;vertical-align:middle;}
.member-chip:hover .chip-file-text{overflow:visible;max-width:none;animation:scroll-text 5s linear infinite;}
@keyframes scroll-text{0%,10%{transform:translateX(0)}90%,100%{transform:translateX(calc(-100% + 100px))}}
.chip-lock{color:var(--yellow);font-size:8px;}
.chip-duration{font-size:7px;color:var(--text-muted);margin-left:2px;}
.chip-conflict{color:var(--red);font-size:10px;animation:glow 1s infinite;}

/* ══ PANELS ══ */
.panels{display:grid;grid-template-columns:0.85fr 1.15fr 1fr;gap:12px;overflow:hidden;}
.col-split{display:flex;flex-direction:column;gap:12px;overflow:hidden;}
.panel{background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;transition:border-color .2s;}
.panel:hover{border-color:rgba(255,255,255,.1);}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--card-border);flex-shrink:0;}
.panel-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
.ph-right{display:flex;align-items:center;gap:6px;}
.panel-count{font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-glow);padding:1px 8px;border-radius:10px;}
.panel-body{padding:8px;overflow-y:auto;flex:1;}
.panel-body::-webkit-scrollbar{width:3px;}
.panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}

/* ══ BUTTONS & FORMS ══ */
.add-btn{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;background:var(--accent-glow);border:1px solid rgba(139,92,246,.25);color:var(--accent);font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.add-btn:hover{background:rgba(139,92,246,.25);border-color:var(--accent);}
.inline-form{display:none;padding:8px 12px;border-bottom:1px solid var(--card-border);background:rgba(139,92,246,.04);flex-shrink:0;}
.inline-form.show{display:block;}
.inline-form input,.inline-form select,.inline-form textarea{width:100%;padding:6px 8px;border-radius:var(--radius-xs);background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-size:11px;font-family:inherit;outline:none;transition:border-color .2s;resize:none;}
.inline-form input:focus,.inline-form select:focus,.inline-form textarea:focus{border-color:var(--accent);}
.form-row{display:flex;gap:6px;margin-top:6px;}
.form-row>*{flex:1;}
.form-actions{display:flex;gap:4px;margin-top:6px;justify-content:flex-end;}
.fbtn{padding:4px 12px;border-radius:var(--radius-xs);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;border:none;}
.fbtn.p{background:var(--accent);color:#fff;}
.fbtn.p:hover{background:#7c3aed;}
.fbtn.g{background:transparent;color:var(--text-dim);border:1px solid var(--glass-border);}
.fbtn.g:hover{color:var(--text);}

/* ══ FEED ══ */
.feed-item{font-size:10px;padding:6px 8px;border-radius:var(--radius-xs);background:var(--glass);border-left:3px solid var(--card-border);margin-bottom:4px;line-height:1.5;transition:all .15s;}
.feed-item:hover{background:rgba(255,255,255,.05);transform:translateX(2px);}
.feed-item.editing{border-left-color:var(--yellow);background:var(--yellow-glow);}
.feed-item.decision{border-left-color:var(--accent);background:var(--accent-glow);}
.feed-item.experience{border-left-color:var(--green);background:var(--green-glow);}
.feed-item.conflict{border-left-color:var(--red);background:var(--red-glow);}
.feed-item.board{border-left-color:var(--blue);background:var(--blue-glow);}
.feed-item.join{border-left-color:var(--orange);background:var(--orange-glow);}
.feed-item.chat{border-left-color:#a78bfa;background:rgba(167,139,250,.1);}
.feed-time{color:var(--text-dim);font-size:8px;margin-right:4px;font-weight:500;}

/* ══ CHAT ══ */
.chat-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:3px;}
.chat-msg{font-size:10px;padding:5px 8px;border-radius:6px;background:var(--glass);line-height:1.4;max-width:95%;}
.chat-msg.mine{background:var(--accent-glow);align-self:flex-end;}
.chat-msg .cm-name{font-weight:600;color:var(--accent);font-size:9px;}
.chat-msg .cm-text{margin-top:1px;}
.chat-msg .cm-time{font-size:7px;color:var(--text-muted);margin-top:2px;}
.chat-mention{color:var(--accent);font-weight:600;cursor:pointer;}
.chat-input-row{display:flex;gap:4px;padding:6px 8px;border-top:1px solid var(--card-border);flex-shrink:0;}
.chat-input{flex:1;padding:6px 8px;border-radius:8px;background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-size:11px;font-family:inherit;outline:none;}
.chat-input:focus{border-color:var(--accent);}
.chat-send{padding:6px 12px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.mention-popup{position:absolute;bottom:100%;left:8px;background:var(--bg2);border:1px solid var(--card-border);border-radius:8px;padding:4px;display:none;z-index:50;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.mention-popup.show{display:block;}
.mention-opt{display:block;width:100%;padding:4px 8px;border:none;background:transparent;color:var(--text);font-size:10px;text-align:left;cursor:pointer;border-radius:4px;font-family:inherit;}
.mention-opt:hover{background:var(--accent-glow);}

/* ══ KANBAN ══ */
.kanban-section{margin-bottom:8px;}
.kanban-label{font-size:9px;color:var(--text-dim);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.kanban-card{background:var(--glass);border-radius:var(--radius-xs);padding:6px 8px;margin-bottom:4px;font-size:10px;border-left:3px solid var(--card-border);transition:all .15s;line-height:1.4;position:relative;}
.kanban-card:hover{background:rgba(255,255,255,.05);}
.kanban-card.todo{border-left-color:var(--text-dim);}
.kanban-card.vibing{border-left-color:var(--green);background:var(--green-glow);}
.kanban-card.done{border-left-color:var(--accent);opacity:.6;}
.kanban-card.blocked{border-left-color:var(--red);background:var(--red-glow);}
.task-id{color:var(--text-muted);font-weight:600;margin-right:3px;font-size:9px;}
.assignee{font-size:8px;color:var(--accent);font-weight:500;margin-top:2px;}
.card-actions{display:none;position:absolute;top:3px;right:3px;gap:2px;align-items:center;}
.kanban-card:hover .card-actions{display:flex;}
.ca{width:20px;height:20px;border-radius:4px;border:none;background:var(--glass);color:var(--text-dim);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;}
.ca:hover{background:var(--accent-glow);color:var(--text);}
.ca.danger:hover{background:var(--red-glow);color:var(--red);}
.status-picker{position:absolute;top:24px;right:3px;z-index:50;background:var(--bg2);border:1px solid var(--card-border);border-radius:var(--radius-xs);padding:3px;min-width:100px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;}
.status-picker.show{display:block;}
.sp-opt{display:block;width:100%;padding:4px 6px;border:none;background:transparent;color:var(--text);font-size:9px;font-weight:500;text-align:left;cursor:pointer;border-radius:3px;font-family:inherit;}
.sp-opt:hover{background:var(--glass);}
.sp-opt.active{color:var(--accent);font-weight:700;}

/* ══ TABS ══ */
.tab-bar{display:flex;gap:2px;padding:6px 10px;border-bottom:1px solid var(--card-border);flex-shrink:0;overflow-x:auto;}
.tab-btn{padding:4px 10px;border-radius:6px;border:none;background:transparent;color:var(--text-dim);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
.tab-btn:hover{color:var(--text);background:var(--glass);}
.tab-btn.active{color:var(--accent);background:var(--accent-glow);}
.tab-content{display:none;flex:1;overflow:hidden;flex-direction:column;}
.tab-content.active{display:flex;}

/* ══ EXPERIENCE ══ */
.exp-item{border-radius:var(--radius-xs);padding:8px;margin-bottom:5px;font-size:10px;border-left:3px solid var(--green);line-height:1.5;transition:all .15s;position:relative;background:var(--green-glow);}
.exp-item.cat-performance{border-left-color:var(--yellow);background:var(--yellow-glow);}
.exp-item.cat-security{border-left-color:var(--red);background:var(--red-glow);}
.exp-item.cat-bugfix{border-left-color:var(--orange);background:var(--orange-glow);}
.exp-item.cat-best-practice{border-left-color:var(--accent);background:var(--accent-glow);}
.exp-item.cat-tooling{border-left-color:var(--blue);background:var(--blue-glow);}
.exp-item.cat-general{border-left-color:var(--green);background:var(--green-glow);}
.exp-item:hover{background:rgba(52,211,153,.12);}
.exp-meta{font-size:8px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-weight:500;}
.exp-meta-left{display:flex;align-items:center;gap:6px;}
.exp-upvote{cursor:pointer;transition:all .15s;padding:1px 5px;border-radius:3px;background:rgba(52,211,153,.1);user-select:none;font-size:9px;}
.exp-upvote:hover{transform:scale(1.1);}
.exp-upvote.voted{background:rgba(52,211,153,.25);}
.exp-cat{font-size:7px;padding:1px 5px;border-radius:3px;font-weight:600;}
.exp-cat.ct-general{background:rgba(52,211,153,.15);color:var(--green);}
.exp-cat.ct-performance{background:var(--yellow-glow);color:var(--yellow);}
.exp-cat.ct-security{background:var(--red-glow);color:var(--red);}
.exp-cat.ct-bugfix{background:var(--orange-glow);color:var(--orange);}
.exp-cat.ct-best-practice{background:var(--accent-glow);color:var(--accent);}
.exp-cat.ct-tooling{background:var(--blue-glow);color:var(--blue);}
.exp-del{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:3px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;}
.exp-item:hover .exp-del{display:flex;}
.exp-del:hover{background:var(--red-glow);color:var(--red);}

/* ══ DECISIONS ══ */
.dec-item{background:var(--accent-glow);border-radius:var(--radius-xs);padding:8px;margin-bottom:5px;font-size:10px;border-left:3px solid var(--accent);line-height:1.5;position:relative;}
.dec-item:hover{background:rgba(139,92,246,.12);}
.dec-what{font-weight:600;}
.dec-why{color:var(--text-dim);margin-top:2px;font-style:italic;}
.dec-meta{font-size:8px;color:var(--text-muted);margin-top:4px;display:flex;gap:6px;}
.dec-type{font-size:7px;padding:1px 5px;border-radius:3px;font-weight:600;}
.dec-type.human{background:var(--blue-glow);color:var(--blue);}
.dec-type.ai{background:var(--accent-glow);color:var(--accent);}
.dec-type.consensus{background:var(--green-glow);color:var(--green);}

/* ══ BLOCKERS ══ */
.blocker-card{background:var(--red-glow);border-radius:var(--radius-xs);padding:8px;margin-bottom:5px;font-size:10px;border-left:3px solid var(--red);line-height:1.5;}
.blocker-card .help-btn{padding:2px 8px;border-radius:4px;border:1px solid rgba(251,146,60,.3);background:var(--orange-glow);color:var(--orange);font-size:8px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit;}
.blocker-card .help-btn:hover{background:rgba(251,146,60,.2);}
.blocker-card .helpers{font-size:8px;color:var(--green);margin-top:3px;}

/* ══ STATS ══ */
.section-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:0 10px;margin-top:3px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:8px 10px;}
.stat-card{text-align:center;padding:8px 4px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--glass-border);transition:all .2s;}
.stat-card .num{font-size:22px;font-weight:800;letter-spacing:-1px;line-height:1;}
.stat-card .label{font-size:8px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
.stat-card.green .num{color:var(--green);}.stat-card.green{background:var(--green-glow);border-color:rgba(52,211,153,.15);}
.stat-card.yellow .num{color:var(--yellow);}.stat-card.yellow{background:var(--yellow-glow);border-color:rgba(251,191,36,.15);}
.stat-card.accent .num{color:var(--accent);}.stat-card.accent{background:var(--accent-glow);border-color:rgba(139,92,246,.15);}
.stat-card.red .num{color:var(--red);}.stat-card.red{background:var(--red-glow);border-color:rgba(248,113,113,.15);}

/* ══ HEATMAP ══ */
.heat-chart{padding:4px 10px;}
.heat-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.heat-label{font-size:9px;color:var(--text-dim);width:200px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;direction:rtl;unicode-bidi:plaintext;}
.heat-track{flex:1;height:16px;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden;}
.heat-fill{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:8px;font-weight:700;color:rgba(255,255,255,.9);min-width:24px;transition:width .6s cubic-bezier(.16,1,.3,1);}
.heat-fill.hot{background:linear-gradient(90deg,#f87171,#ef4444);}
.heat-fill.warm{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.heat-fill.cool{background:linear-gradient(90deg,#34d399,#10b981);}
.heat-fill.cold{background:linear-gradient(90deg,#60a5fa,#3b82f6);}

/* ══ SPRINT ══ */
.sprint-widget{padding:8px 10px;}
.sprint-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.sprint-name{font-size:10px;font-weight:700;}
.sprint-dates{font-size:8px;color:var(--text-dim);}
.sprint-bar{height:12px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden;margin-bottom:6px;}
.sprint-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:6px;transition:width .6s;}
.sprint-goals{display:flex;flex-wrap:wrap;gap:4px;}
.sprint-goal{font-size:8px;padding:2px 6px;border-radius:4px;background:var(--glass);border:1px solid var(--glass-border);cursor:pointer;transition:all .15s;font-family:inherit;color:var(--text-dim);}
.sprint-goal:hover{border-color:var(--accent);}
.sprint-goal.done{text-decoration:line-through;opacity:.5;border-color:var(--green);}

/* ══ CONTRIBUTION ══ */
.contrib{padding:4px 10px;}
.contrib-table{width:100%;border-spacing:0 3px;}
.contrib-table th{font-size:8px;color:var(--text-muted);font-weight:600;text-align:center;padding:0 4px 4px;}
.contrib-table th:first-child{text-align:right;}
.contrib-table td{padding:2px 4px;text-align:center;}
.contrib-table td:first-child{font-size:9px;color:var(--text-dim);text-align:right;font-weight:500;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cv{display:inline-flex;align-items:center;justify-content:center;min-width:28px;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700;}
.cv.edits{background:var(--accent-glow);color:var(--accent);}
.cv.tasks{background:var(--green-glow);color:var(--green);}
.cv.exps{background:var(--blue-glow);color:var(--blue);}
.cv.top{box-shadow:0 0 0 1px currentColor;}

/* ══ SEARCH OVERLAY ══ */
.search-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:300;align-items:flex-start;justify-content:center;padding-top:15vh;}
.search-overlay.show{display:flex;}
.search-box{width:560px;max-width:90%;background:var(--bg2);border:1px solid var(--card-border);border-radius:16px;overflow:hidden;box-shadow:0 24px 48px rgba(0,0,0,.4);}
.search-input{width:100%;padding:14px 18px;background:transparent;border:none;color:var(--text);font-size:15px;font-family:inherit;outline:none;}
.search-input::placeholder{color:var(--text-muted);}
.search-results{max-height:400px;overflow-y:auto;border-top:1px solid var(--card-border);}
.search-cat{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;padding:6px 16px 2px;letter-spacing:.5px;}
.search-item{padding:8px 16px;font-size:11px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px;}
.search-item:hover{background:var(--accent-glow);}
.search-item .si-icon{font-size:13px;width:20px;text-align:center;flex-shrink:0;}
.search-item .si-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.search-item .si-sub{font-size:9px;color:var(--text-dim);flex-shrink:0;}
.search-hint{font-size:10px;color:var(--text-muted);text-align:center;padding:20px;}

/* ══ NOTIF DROPDOWN ══ */
/* ══ NOTIF PANEL (fixed, glass) ══ */
.notif-panel{position:fixed;top:58px;right:20px;width:320px;max-height:420px;z-index:200;
  background:rgba(16,16,28,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.1);border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04) inset;
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(-10px) scale(0.97);opacity:0;pointer-events:none;transition:all .25s cubic-bezier(.16,1,.3,1);}
body.light .notif-panel{background:rgba(255,255,255,0.8);border-color:rgba(0,0,0,0.08);box-shadow:0 16px 48px rgba(0,0,0,0.12);}
.notif-panel.show{transform:translateY(0) scale(1);opacity:1;pointer-events:auto;}
.notif-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--card-border);flex-shrink:0;}
.notif-header span{font-size:12px;font-weight:700;}
.notif-clear{font-size:9px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit;font-weight:600;}
.notif-clear:hover{text-decoration:underline;}
.notif-list{overflow-y:auto;flex:1;}
.notif-item{padding:10px 16px;border-bottom:1px solid var(--card-border);font-size:11px;line-height:1.5;cursor:pointer;transition:all .2s;position:relative;}
.notif-item:hover{background:rgba(255,255,255,0.05);}
.notif-item.unread{background:rgba(139,92,246,0.06);border-left:3px solid var(--accent);}
.notif-item .ni-title{font-weight:600;display:flex;justify-content:space-between;align-items:center;}
.notif-item .ni-close{font-size:14px;color:var(--text-muted);cursor:pointer;padding:0 2px;opacity:0;transition:opacity .15s;}
.notif-item:hover .ni-close{opacity:1;}
.notif-item .ni-close:hover{color:var(--red);}
.notif-item .ni-detail{color:var(--text-dim);margin-top:2px;}
.notif-item .ni-time{font-size:8px;color:var(--text-muted);margin-top:3px;}
.notif-empty{font-size:11px;color:var(--text-muted);text-align:center;padding:32px 16px;}

/* ══ REPORT MODAL ══ */
.report-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center;}
.report-overlay.show{display:flex;}
.report-box{width:640px;max-width:95%;max-height:80vh;background:var(--bg2);border:1px solid var(--card-border);border-radius:16px;display:flex;flex-direction:column;box-shadow:0 24px 48px rgba(0,0,0,.4);}
.report-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--card-border);}
.report-head span{font-size:14px;font-weight:700;}
.report-close{cursor:pointer;font-size:18px;color:var(--text-dim);}
.report-tabs{display:flex;gap:4px;padding:10px 18px;border-bottom:1px solid var(--card-border);}
.report-tab{padding:4px 12px;border-radius:6px;border:none;background:transparent;color:var(--text-dim);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.report-tab.active{color:var(--accent);background:var(--accent-glow);}
.report-preview{flex:1;overflow-y:auto;padding:16px 18px;font-size:11px;line-height:1.7;white-space:pre-wrap;font-family:'JetBrains Mono','Fira Code',monospace;color:var(--text-dim);}
.report-preview h1,.report-preview h2,.report-preview h3{color:var(--text);font-family:inherit;}
.report-actions{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--card-border);justify-content:flex-end;}
.rbtn{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s;}
.rbtn.copy{background:var(--glass);border:1px solid var(--glass-border);color:var(--text);}
.rbtn.copy:hover{border-color:var(--accent);}
.rbtn.ai{background:linear-gradient(135deg,var(--accent),var(--blue));color:#fff;}
.rbtn.ai:hover{opacity:.9;transform:scale(1.02);}

/* ══ MODAL ══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--card-border);border-radius:20px;padding:28px;max-width:420px;width:90%;text-align:center;position:relative;box-shadow:0 24px 48px rgba(0,0,0,.4);}
.modal-close{position:absolute;top:14px;right:18px;cursor:pointer;font-size:16px;color:var(--text-dim);}
.modal img{width:80px;height:80px;image-rendering:pixelated;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));}
.modal .name{font-size:18px;font-weight:700;}
.modal .role{font-size:12px;color:var(--accent);margin-bottom:12px;font-weight:500;}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.modal-stat{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:10px;}
.modal-stat .val{font-size:20px;font-weight:800;color:var(--accent);}
.modal-stat .lbl{font-size:9px;color:var(--text-dim);font-weight:500;margin-top:1px;}
.badge-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:12px;justify-content:center;}
.badge{padding:3px 8px;border-radius:6px;font-size:9px;font-weight:600;background:var(--glass);border:1px solid var(--glass-border);}
.badge.earned{background:var(--accent-glow);border-color:rgba(139,92,246,.3);color:var(--accent);}
.badge.locked{opacity:.3;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#fff;padding:8px 18px;border-radius:8px;font-size:11px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:400;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

.empty{font-size:11px;color:var(--text-muted);text-align:center;padding:24px 12px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px;}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">covibe</span>
    <span class="topbar-stat" id="teamTitle">等待成员上线...</span>
  </div>
  <div class="topbar-right">
    <div class="me-badge" onclick="openMeEdit()" title="点击修改身份"><span class="me-avatar" id="meAvatar"></span><span id="meName"></span><span id="meSource" style="font-size:8px;color:var(--text-muted);margin-left:2px;"></span></div>
    <div class="conn-badge"><span id="connDot" class="conn-dot off"></span><span id="connLabel">连接中</span></div>
    <button class="tb" onclick="openReport()" title="生成报告">&#128196;</button>
    <button class="tb" onclick="openSearch()" title="搜索 Ctrl+K">&#128269;</button>
    <button class="tb" id="pomoBtn" onclick="togglePomo()" title="专注计时"><span id="pomoIcon">&#9201;</span><span class="pomo-timer" id="pomoTimer" style="display:none"></span></button>
    <button class="tb" id="notifBtn" onclick="toggleNotif(event)" title="通知" style="position:relative">&#128276;<span class="badge-dot" id="notifBadge"></span></button>
    <button class="tb" onclick="toggleTheme()" title="切换主题">&#9789;</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="team-bar" id="teamChips"></div>
  <div class="panels">
    <!-- Col 1: Feed + Chat -->
    <div class="col-split">
      <div class="panel" style="flex:1;min-height:0;">
        <div class="panel-head"><div class="panel-title">&#9889; 实时动态</div><div class="panel-count" id="feedCount">0</div></div>
        <div class="panel-body" id="feedBody"><div class="empty">等待活动...</div></div>
      </div>
      <div class="panel" style="flex:1;min-height:0;">
        <div class="panel-head"><div class="panel-title">&#128172; 团队聊天</div><div class="panel-count" id="chatCount">0</div></div>
        <div class="chat-body" id="chatBody"><div class="empty">输入消息，@ 可提及成员</div></div>
        <div class="chat-input-row" style="position:relative;">
          <div class="mention-popup" id="mentionPopup"></div>
          <input class="chat-input" id="chatInput" placeholder="发送消息... (@提及)" onkeydown="chatKeydown(event)" oninput="chatOnInput(event)">
          <button class="chat-send" onclick="sendChat()">发送</button>
        </div>
      </div>
    </div>

    <!-- Col 2: Board -->
    <div class="panel">
      <div class="panel-head"><div class="panel-title">&#128203; 任务看板</div><div class="ph-right"><div class="panel-count" id="boardCount">0</div><button class="add-btn" onclick="toggleForm('boardForm')">+ 添加</button></div></div>
      <div class="inline-form" id="boardForm">
        <input id="boardInput" type="text" placeholder="任务内容..." onkeydown="if(event.key==='Enter')addTask()">
        <div class="form-row"><input id="boardAssignee" type="text" placeholder="分配给（可选）"></div>
        <div class="form-actions"><button class="fbtn g" onclick="toggleForm('boardForm')">取消</button><button class="fbtn p" onclick="addTask()">添加</button></div>
      </div>
      <div class="panel-body" id="boardBody"><div class="empty">点击「+ 添加」创建任务</div></div>
    </div>

    <!-- Col 3: Tabs + Stats -->
    <div class="col-split">
      <div class="panel" style="flex:1;min-height:0;">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('exp')">&#128161; 经验</button>
          <button class="tab-btn" onclick="switchTab('dec')">&#9878; 决策</button>
          <button class="tab-btn" onclick="switchTab('blk')">&#128679; 阻塞</button>
        </div>
        <!-- EXP TAB -->
        <div class="tab-content active" id="tab-exp">
          <div class="inline-form" id="expForm">
            <input id="expInput" placeholder="记录经验..." onkeydown="if(event.key==='Enter')addExp()">
            <div class="form-row"><select id="expCat"><option value="general">通用</option><option value="performance">性能</option><option value="security">安全</option><option value="bugfix">踩坑</option><option value="best-practice">最佳实践</option><option value="tooling">工具</option></select></div>
            <div class="form-actions"><button class="fbtn g" onclick="toggleForm('expForm')">取消</button><button class="fbtn p" onclick="addExp()">记录</button></div>
          </div>
          <div class="panel-body" id="expBody"><div class="empty">分享你的经验</div></div>
          <div style="padding:4px 8px;border-top:1px solid var(--card-border);flex-shrink:0;"><button class="add-btn" onclick="toggleForm('expForm')" style="width:100%;justify-content:center;">+ 记录经验</button></div>
        </div>
        <!-- DEC TAB -->
        <div class="tab-content" id="tab-dec">
          <div class="inline-form" id="decForm">
            <input id="decWhat" placeholder="决定了什么..." onkeydown="if(event.key==='Enter')addDec()">
            <div class="form-row"><input id="decWhy" placeholder="为什么做此决策..."></div>
            <div class="form-row"><select id="decType"><option value="human">人工决策</option><option value="ai">AI 建议</option><option value="consensus">团队共识</option></select></div>
            <div class="form-actions"><button class="fbtn g" onclick="toggleForm('decForm')">取消</button><button class="fbtn p" onclick="addDec()">记录</button></div>
          </div>
          <div class="panel-body" id="decBody"><div class="empty">记录团队决策</div></div>
          <div style="padding:4px 8px;border-top:1px solid var(--card-border);flex-shrink:0;"><button class="add-btn" onclick="toggleForm('decForm')" style="width:100%;justify-content:center;">+ 记录决策</button></div>
        </div>
        <!-- BLK TAB -->
        <div class="tab-content" id="tab-blk">
          <div class="panel-body" id="blkBody"><div class="empty">暂无阻塞任务</div></div>
        </div>
      </div>
      <!-- Stats bottom -->
      <div class="panel" style="flex-shrink:0;">
        <div class="panel-head"><div class="panel-title">&#128202; 统计</div></div>
        <div class="section-label">团队实时状态</div>
        <div class="stats-grid">
          <div class="stat-card green"><div class="num" id="sOnline">0</div><div class="label">在线</div></div>
          <div class="stat-card yellow"><div class="num" id="sEditing">0</div><div class="label">编辑中</div></div>
          <div class="stat-card accent"><div class="num" id="sMessages">0</div><div class="label">消息</div></div>
          <div class="stat-card red"><div class="num" id="sConflicts">0</div><div class="label">冲突</div></div>
        </div>
        <div class="section-label">文件编辑热力</div>
        <div class="heat-chart" id="heatBody"></div>
        <div class="section-label" id="sprintLabel" style="display:none">迭代目标 — 点击标记完成</div>
        <div class="sprint-widget" id="sprintWidget" style="display:none"></div>
        <div class="section-label">成员贡献 — 编辑/任务/经验</div>
        <div class="contrib" id="contribBody"></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- OVERLAYS -->
<div class="modal-overlay" id="memberModal"><div class="modal"><span class="modal-close" onclick="closeModal()">&#10005;</span><div id="modalContent"></div></div></div>
<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()"><div class="search-box"><input class="search-input" id="searchInput" placeholder="搜索任务、经验、决策、聊天..." oninput="doSearch(this.value)"><div class="search-results" id="searchResults"><div class="search-hint">输入关键词搜索 (Ctrl+K)</div></div></div></div>
<div class="report-overlay" id="reportOverlay" onclick="if(event.target===this)closeReport()"><div class="report-box"><div class="report-head"><span>&#128196; 团队报告</span><span class="report-close" onclick="closeReport()">&#10005;</span></div><div class="report-tabs"><button class="report-tab active" onclick="genReport('daily',this)">日报</button><button class="report-tab" onclick="genReport('weekly',this)">周报</button></div><div class="report-preview" id="reportPreview">选择报告类型...</div><div class="report-actions"><button class="rbtn copy" onclick="copyReport()">&#128203; 复制 Markdown</button><button class="rbtn ai" onclick="aiEnhance()">&#10024; AI 润色 (Claude Code)</button></div></div></div>
<div class="me-edit-overlay" id="meEditOverlay" onclick="if(event.target===this)closeMeEdit()">
  <div class="me-edit-box">
    <h3>&#128100; 你是谁？</h3>
    <div class="me-hint">选择你的身份，或输入名字。<br>推荐在终端设置: <code>export HARNESS_SYNC_USER="名字"</code></div>
    <div class="me-member-list" id="meMemberList"></div>
    <input id="meEditInput" placeholder="或输入新名字..." onkeydown="if(event.key==='Enter')saveMeEdit()">
    <div class="me-edit-actions">
      <button class="fbtn g" onclick="closeMeEdit()">取消</button>
      <button class="fbtn p" onclick="saveMeEdit()">确认</button>
    </div>
  </div>
</div>
<div class="notif-panel" id="notifPanel">
  <div class="notif-header"><span>&#128276; 通知</span><button class="notif-clear" onclick="clearNotifs(event)">全部已读</button></div>
  <div class="notif-list" id="notifList"><div class="notif-empty">暂无通知</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const P=new URLSearchParams(location.search),wsHost=P.get('server')||'localhost:3456',token=P.get('token')||'';
let myName=P.get('name')||localStorage.getItem('covibe-myname')||''; // URL(env) > localStorage > empty

/* ══ STATE ══ */
const members=new Map(),feed=[],fileEdits={},memberEdits={};
let conflictCount=0,ws;
const boardTasks=[],experiences=[],decisions=[],chatMessages=[],notifications=[];
let boardId=0,expId=0,decId=0,chatId=0,notifId=0,unread=0;
const blockerHelp=new Map();
const pomo={running:false,remaining:25*60,mode:'work',startedAt:0,id:null};
const sprint={name:'',goals:[],start:null,end:null};
let activeTab='exp',reportText='';

const STATE_MAP={
  editing:{gif:'clawd-typing.gif',label:'正在编辑',cls:'vibing'},
  vibing:{gif:'clawd-typing.gif',label:'vibing',cls:'vibing'},
  thinking:{gif:'clawd-thinking.gif',label:'思考中',cls:'vibing'},
  building:{gif:'clawd-building.gif',label:'构建中',cls:'vibing'},
  blocked:{gif:'clawd-error.gif',label:'阻塞',cls:'blocked'},
  done:{gif:'clawd-happy.gif',label:'完成',cls:'vibing'},
  idle:{gif:'clawd-idle.gif',label:'空闲',cls:''},
  sleep:{gif:'clawd-sleeping.gif',label:'离线',cls:''},
  focusing:{gif:'clawd-thinking.gif',label:'专注中',cls:'focusing'},
};
const BADGES={
  'first-edit':{i:'🏁',l:'首次编辑'},'hot-streak':{i:'🔥',l:'编辑达人'},'speed-demon':{i:'⚡',l:'任务高手'},
  'mentor':{i:'🎓',l:'经验导师'},'decision-maker':{i:'⚖️',l:'决策者'},'team-player':{i:'🤝',l:'协作之星'},
  'night-owl':{i:'🦉',l:'夜猫子'},'bug-squasher':{i:'🐛',l:'踩坑专家'},
};

/* ══ UTILS ══ */

function genReport(period,btn){document.querySelectorAll('.report-tab').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hrs=period==='daily'?24:168;const since=Date.now()-hrs*3600000;const label=period==='daily'?'日报':'周报';const date=new Date().toLocaleDateString('zh-CN');

for(const[n,m]of members){
  r+=`### ${n}\n`;

  r+=`- 编辑次数: ${m.edits||0}\n`;
  const myTasks=boardTasks.filter(t=>t.assignee===n);const done=myTasks.filter(t=>t.status==='done').map(t=>`#${t.id} ${t.content}`);const wip=myTasks.filter(t=>t.status==='vibing').map(t=>`#${t.id} ${t.content}`);const blk=myTasks.filter(t=>t.status==='blocked').map(t=>`#${t.id} ${t.content}`);
  if(done.length)r+=`- 已完成: ${done.join('; ')}\n`;if(wip.length)r+=`- 进行中: ${wip.join('; ')}\n`;if(blk.length)r+=`- **阻塞**: ${blk.join('; ')}\n`;
  const myDec=decisions.filter(d=>d.author===n).map(d=>d.what);if(myDec.length)r+=`- 决策: ${myDec.join('; ')}\n`;
  const myExp=experiences.filter(e=>e.author===n).map(e=>e.content.slice(0,60));if(myExp.length)r+=`- 经验: ${myExp.join('; ')}\n`;
  r+=`\n`;}
if(boardTasks.filter(t=>t.status==='blocked').length){r+=`## 阻塞项 (需关注)\n`;boardTasks.filter(t=>t.status==='blocked').forEach(t=>{r+=`- #${t.id} ${t.content} (${t.assignee||'未分配'})\n`;});r+=`\n`;}

function render(){
  const chips=document.getElementById('teamChips'),title=document.getElementById('teamTitle');
  if(!members.size){title.textContent='等待成员上线...';chips.innerHTML='';return;}
  const onC=[...members.values()].filter(m=>m.status!=='sleep').length,edC=[...members.values()].filter(m=>m.status==='editing').length;
  title.innerHTML=`<b>${onC}</b> 在线 · <b>${edC}</b> 编辑中`;
  // Check file conflicts
  const fileUsers={};for(const[n,m]of members)if(m.status==='editing'&&m.file){if(!fileUsers[m.file])fileUsers[m.file]=[];fileUsers[m.file].push(n);}
  let h='';for(const[n,m]of members){const s=STATE_MAP[m.status]||STATE_MAP.idle;const dur=m.editStart?Math.floor((Date.now()-m.editStart)/60000):0;const durStr=dur?` ${dur}m`:'';const conflict=m.file&&fileUsers[m.file]&&fileUsers[m.file].length>1;
  const isMe=n===myName;h+=`<div class="member-chip ${s.cls}" onclick="showMember('${n}')"><img src="assets/${s.gif}"><div class="chip-info"><div class="chip-name">${n}${isMe?'<span class="chip-me">ME</span>':''}</div><div class="chip-sub">${s.label}${durStr?`<span class="chip-duration">${durStr}</span>`:''}</div>${m.file?`<div class="chip-file">${m.status==='editing'?'<span class="chip-lock">&#128274;</span>':''}<span class="chip-file-text">${m.file}</span>${conflict?'<span class="chip-conflict"> &#9888;</span>':''}</div>`:''}</div></div>`;}
  chips.innerHTML=h;
  // Feed
  document.getElementById('feedCount').textContent=feed.length;
  document.getElementById('feedBody').innerHTML=feed.slice(0,15).map(f=>{const t=f.ts?new Date(f.ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}):'';return`<div class="feed-item ${f.type}"><span class="feed-time">${t}</span>${f.text}</div>`;}).join('')||'<div class="empty">等待活动...</div>';
  // Stats
  document.getElementById('sOnline').textContent=onC;document.getElementById('sEditing').textContent=edC;
  document.getElementById('sMessages').textContent=feed.length;document.getElementById('sConflicts').textContent=conflictCount;
  // Heat
  const sorted=Object.entries(fileEdits).sort((a,b)=>b[1]-a[1]).slice(0,6);const mx=sorted[0]?.[1]||1;
  document.getElementById('heatBody').innerHTML=sorted.length?sorted.map(([f,c])=>{const p=Math.max(8,Math.round(c/mx*100));const ratio=c/mx;const cls=ratio>=0.8?'hot':ratio>=0.5?'warm':ratio>=0.25?'cool':'cold';const shortName=f.replace(/^.*?(?=\w+\/)/,'');return`<div class="heat-row"><span class="heat-label" title="${f}">${shortName}</span><div class="heat-track"><div class="heat-fill ${cls}" style="width:${p}%">${c}</div></div></div>`;}).join(''):'<div class="empty">暂无</div>';
  renderBoard();renderChat();renderExp();renderDec();renderBlockers();renderSprint();renderContrib();
}

/* ══ MEMBER MODAL ═��� */
function showMember(n){const m=members.get(n);if(!m)return;const s=STATE_MAP[m.status]||STATE_MAP.idle;const recent=feed.filter(f=>f.text.includes(n)).slice(0,5);const badges=getBadges(n);
document.getElementById('modalContent').innerHTML=`<img src="assets/${s.gif}"><div class="name">${n}</div><div class="role">${s.label}${m.file?' · '+m.file:''}</div><div class="modal-stats"><div class="modal-stat"><div class="val">${m.edits||0}</div><div class="lbl">编辑次数</div></div><div class="modal-stat"><div class="val">${boardTasks.filter(t=>t.assignee===n&&t.status==='done').length}</div><div class="lbl">完成任务</div></div></div><div class="badge-row">${Object.entries(BADGES).map(([k,v])=>`<span class="badge ${badges.includes(k)?'earned':'locked'}">${v.i} ${v.l}</span>`).join('')}</div>${recent.length?'<div style="text-align:left;margin-top:12px;">'+recent.map(f=>`<div class="feed-item ${f.type}" style="margin-top:4px"><span class="feed-time">${new Date(f.ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</span>${f.text}</div>`).join('')+'</div>':''}`;
document.getElementById('memberModal').classList.add('show');}
function closeModal(){document.getElementById('memberModal').classList.remove('show');}
document.getElementById('memberModal').onclick=e=>{if(e.target.classList.contains('modal-overlay'))closeModal();};

/* ══ MESSAGE HANDLING ══ */
function handleMessage(msg,isLocal){
  const ts=msg.ts||new Date().toISOString();
  switch(msg.type){
    case'catchup':(msg.messages||[]).forEach(m=>handleMessage(m));break;
    case'active_edits':for(const[f,i]of Object.entries(msg.edits||{}))updateMember(i.editor,'editing',f);break;
    case'joined':case'join':if(msg.name!=='\u{1F5A5}\uFE0F Dashboard'){updateMember(msg.name,'idle');addFeed('join',`\uD83D\uDFE2 ${msg.name} 上线了`,ts);}break;
    case'left':updateMember(msg.name,'sleep');addFeed('join',`\uD83D\uDD34 ${msg.name} 下线了`,ts);break;
    case'editing':updateMember(msg.name,'editing',msg.file);addFeed('editing',`\u270F\uFE0F ${msg.name} \u2192 ${msg.file}`,ts);break;
    case'done_editing':updateMember(msg.name,'idle');break;
    case'decision':addFeed('decision',`\uD83D\uDCCB ${msg.name}: ${msg.what}`,ts);if(!isLocal&&msg.what){decId++;decisions.unshift({id:msg.decision_key||decId,what:msg.what,why:msg.why||'',author:msg.name,type:msg.decision_type||'human',ts});}break;
    case'experience':addFeed('experience',`\uD83D\uDCA1 ${msg.name}: ${msg.content}`,ts);if(!isLocal&&msg.content){expId++;experiences.unshift({id:msg.expId||expId,content:msg.content,category:msg.category||'general',author:msg.name,votes:0,voters:[],ts});}break;
    case'conflict':conflictCount++;addFeed('conflict',`\u26A0\uFE0F ${msg.other_editor} \u548C ${msg.name||'?'} \u51B2\u7A81 ${msg.file}`,ts);addNotif('conflict','文件冲突',`${msg.file}`);break;
    case'board':addFeed('board',`\uD83D\uDCCC ${msg.name} ${msg.action}: ${msg.task?.content||''}`,ts);if(!isLocal&&msg.task){const t=msg.task;if(msg.action==='add'){if(!boardTasks.find(x=>x.id===t.id)){boardTasks.push(t);if(t.id>boardId)boardId=t.id;}if(t.assignee===myName)addNotif('assigned','新任务',t.content);}else if(msg.action==='drop'){const i=boardTasks.findIndex(x=>x.id===t.id);if(i>=0)boardTasks.splice(i,1);}else if(msg.action==='help'){if(!blockerHelp.has(t.id))blockerHelp.set(t.id,{by:msg.name,helpers:[],ts});if(t.assignee===myName)addNotif('help','求助请求',t.content);}else if(msg.action==='help_offer'){const h=blockerHelp.get(t.id);if(h&&msg.helper&&!h.helpers.includes(msg.helper))h.helpers.push(msg.helper);}else{const ex=boardTasks.find(x=>x.id===t.id);if(ex)Object.assign(ex,t);}}break;
    case'chat':if(!isLocal){chatId++;chatMessages.push({id:msg.chatId||chatId,author:msg.name,content:msg.content,mentions:msg.mentions||[],ts});if((msg.mentions||[]).includes(myName))addNotif('mention',`${msg.name} 提到了你`,msg.content);}addFeed('chat',`\uD83D\uDCAC ${msg.name}: ${msg.content}`,ts);break;
    case'team_broadcast':addFeed('decision',`\uD83D\uDCE2 ${msg.name}: ${msg.content}`,ts);break;
    case'sprint':if(!isLocal&&msg.sprint){Object.assign(sprint,msg.sprint);}break;
  }
  render();
}

/* ══ WEBSOCKET ══ */
function connect(){try{ws=new WebSocket(`ws://${wsHost}${token?'?token='+token:''}`);ws.onopen=()=>{document.getElementById('connDot').className='conn-dot on';document.getElementById('connLabel').textContent='已连接';if(myName)ws.send(JSON.stringify({type:'join',name:myName}));};ws.onerror=()=>{};ws.onclose=()=>{document.getElementById('connDot').className='conn-dot off';document.getElementById('connLabel').textContent='已断开';setTimeout(connect,5000);};ws.onmessage=e=>{try{handleMessage(JSON.parse(e.data));}catch{}};}catch{setTimeout(connect,5000);}}
async function pollStatus(){try{const r=await fetch(`http://${wsHost}/status${token?'?token='+token:''}`);const d=await r.json();for(const[f,i]of Object.entries(d.active_edits||{}))updateMember(i.editor,'editing',f);for(const n of(d.members||[]))if(!members.has(n))updateMember(n,'idle');render();}catch{}try{const r=await fetch(`http://${wsHost}/since?ts=${new Date(Date.now()-60000).toISOString()}${token?'&token='+token:''}`);const d=await r.json();for(const m of(d.messages||[]))if(!feed.find(f=>f.ts===m.ts))handleMessage(m);}catch{}}
